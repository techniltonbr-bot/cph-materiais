<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Capa — Mapas Mentais</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#eee}
  .capa{
    width:500px;height:625px;
    margin:20px auto;
    background:linear-gradient(160deg,#0D1B3E 0%,#132a5c 55%,#0D1B3E 100%);
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    position:relative;
    overflow:hidden;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:34px 30px;
    text-align:center;
  }
  .capa::before{
    content:"";
    position:absolute;top:-60px;right:-60px;
    width:220px;height:220px;
    background:radial-gradient(circle,rgba(61,190,94,.35),transparent 70%);
  }
  .capa::after{
    content:"";
    position:absolute;bottom:-70px;left:-70px;
    width:240px;height:240px;
    background:radial-gradient(circle,rgba(254,223,0,.18),transparent 70%);
  }
  .logo-img{
    width:78px;height:78px;
    border-radius:50%;
    object-fit:cover;
    background:rgba(255,255,255,.92);
    box-shadow:0 0 0 3px rgba(254,223,0,.35), 0 8px 20px rgba(0,0,0,.35);
    padding:3px;
    margin-bottom:14px;
    position:relative;z-index:2;
  }
  .kicker{
    display:inline-block;background:rgba(254,223,0,.15);
    border:1px solid rgba(254,223,0,.4);color:#FEDF00;
    font-size:11px;font-weight:800;letter-spacing:.5px;
    padding:5px 12px;border-radius:16px;margin-bottom:16px;
    text-transform:uppercase;position:relative;z-index:2;
  }
  .titulo{
    font-size:30px;font-weight:900;line-height:1.25;margin-bottom:10px;
    position:relative;z-index:2;
  }
  .titulo span{color:#3DBE5E}
  .sub{
    font-size:14px;color:rgba(255,255,255,.75);max-width:340px;
    margin-bottom:22px;line-height:1.5;position:relative;z-index:2;
  }
  .icone-central{
    font-size:64px;margin:10px 0 20px;position:relative;z-index:2;
  }
  .grade{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    width:100%;max-width:360px;margin-bottom:24px;
    position:relative;z-index:2;
  }
  .grade div{
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.15);
    border-radius:10px;
    font-size:11px;font-weight:700;
    padding:8px 4px;
  }
  .rodape{
    margin-top:auto;position:relative;z-index:2;
  }
  .preco{
    font-size:26px;font-weight:900;color:#FEDF00;margin-bottom:4px;
  }
  .marca{
    font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.5px;
  }
</style>
</head>
<body>

  <div class="capa">
    <img src="https://minicurso.clasesportugues.com/assets/Logo.jpeg" alt="Clases Portugués" class="logo-img">
    <div class="kicker">🧠 Material de Estudo</div>
    <div class="titulo">15 Mapas<br><span>Mentais</span></div>
    <div class="sub">Vocabulário e gramática em português, de forma visual e rápida de revisar</div>
    <div class="icone-central">🗺️</div>
    <div class="grade">
      <div>👋 Saudações</div>
      <div>👨‍👩‍👧 Família</div>
      <div>🏠 Casa</div>
      <div>🍽️ Refeições</div>
      <div>🏙️ Cidade</div>
      <div>💪 Corpo/Saúde</div>
      <div>💼 Trabalho</div>
      <div>🛍️ Compras</div>
      <div>😊 Emoções</div>
    </div>
    <div class="rodape">
      <div class="preco">US$27</div>
      <div class="marca">CLASES PORTUGUÉS</div>
    </div>
  </div>

</body>
</html>
